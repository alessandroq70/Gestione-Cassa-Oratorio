name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Consenti un solo deploy concorrente, senza annullare quelli in corso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepara il sito
        run: |
          mkdir -p _site
          cp "Gestione Cassa Oratorio (HTML standalone).html" _site/index.html

      - name: Configura Pages (abilita Pages se non attivo)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Carica artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
